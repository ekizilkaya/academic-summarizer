<!DOCTYPE html>
<html>
<head>
    <title>Academic Journal Summarizer</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 960px; /* Increased max-width for better layout */
            margin: auto;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        /* Style adjustments for the result area */
        #result {
            white-space: pre-wrap;
            word-wrap: break-word; /* Handles long words */
            overflow-x: auto;  /* Adds horizontal scrolling if needed */
            margin-top: 20px;
            border: 1px solid #ddd;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 4px; /* Rounded corners */
        }
        /* Custom styles for journal selection */
        .journal-group {
            margin-bottom: 15px;
        }
        .journal-group label {
            font-weight: bold;
        }
        .journal-option {
             display: inline-block; /* Display options horizontally */
            margin-right: 15px;
            margin-bottom: 5px; /* Space out options */
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            background-color: #fff;
            cursor: pointer; /* Indicate clickable */
        }
       .journal-option.active {
            background-color: #007bff; /* Bootstrap primary color */
            border-color: #007bff;
            color: white;
        }
        /* Spinner styles */
        .spinner-container {
            display: none;
            margin-top: 20px;
            text-align: center; /* Center the spinner */
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: auto; /* Center horizontally */
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* Navbar Styling*/
        nav {
          margin-bottom: 20px;
        }
        nav a {
          margin-right: 10px;
          text-decoration: none;
          color: #007bff;
        }
        nav a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>
    <nav>
      <a href="/">Home</a> |
      <a href="/about">About</a>
    </nav>

    <div class="container">
        <h1>Academic Journal Summarizer</h1>
        <p style="font-size: 1.2em; color: gray;">{{ subtitle | safe }}</p>

        <form method="POST" id="analysis-form">
            <div class="form-group">
                <label for="api_key">Gemini API Key:</label>
                <input type="text" class="form-control" id="api_key" name="api_key">
            </div>

            <div class="form-group journal-group">
                <label>Select Journals (up to 3):</label>
                <div id="journal-options">
                    {% for journal, url in journal_dict.items() %}
                    <div class="journal-option" data-value="{{ journal }}">
                        {{ journal }}
                    </div>
                    {% endfor %}
                </div>
                <!-- Hidden input to store selected journals -->
                <input type="hidden" name="journals" id="selected-journals">
            </div>

            <div class="form-group">
                <label for="custom_rss_url">Custom RSS URL (Optional):</label>
                <input type="text" class="form-control" id="custom_rss_url" name="custom_rss_url">
            </div>

            <button type="submit" class="btn btn-primary">Analyze Feed Contents</button>
        </form>

        <div class="spinner-container" id="spinner-container">
            <div class="spinner"></div>
            <p>Analyzing... Please wait.</p>
        </div>

        <div id="result"></div>
    </div>

    <script>
        const form = document.getElementById('analysis-form');
        const spinnerContainer = document.getElementById('spinner-container');
        const resultDiv = document.getElementById('result');
        const journalOptions = document.querySelectorAll('.journal-option');
        const selectedJournalsInput = document.getElementById('selected-journals');
        let selectedJournals = [];

        // Journal selection logic
        journalOptions.forEach(option => {
            option.addEventListener('click', () => {
                const journal = option.dataset.value;
                if (selectedJournals.includes(journal)) {
                    selectedJournals = selectedJournals.filter(j => j !== journal);
                    option.classList.remove('active');
                } else {
                    if (selectedJournals.length < 3) {
                        selectedJournals.push(journal);
                        option.classList.add('active');
                    }
                }
                selectedJournalsInput.value = selectedJournals.join(','); // Update hidden input
            });
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            spinnerContainer.style.display = 'block';
            resultDiv.innerHTML = '';
            resultDiv.style.display = 'none';

            const formData = new FormData(form);
             //Remove the journals field, and replace with our comma separated string
            formData.delete('journals')
            formData.append('journals', selectedJournalsInput.value)

            const response = await fetch('/', {
                method: 'POST',
                body: formData
            });

            if (response.status === 202) {
                pollForResult();
            } else if (response.ok) {
                const data = await response.json();
                displayResult(data);
            } else {
                  spinnerContainer.style.display = 'none'; // Hide the spinner
                  const errorData = await response.json();
                  resultDiv.innerHTML = `<p style="color: red;">Error: ${errorData.error}</p>`;
                  resultDiv.style.display = 'block'; // Show result div with error
            }
        });

        async function pollForResult() {
            const response = await fetch('/results');
            if (response.ok) {
                const data = await response.json();
                if (data.status === 'completed') {
                    displayResult(data);
                } else if (data.status === 'pending') {
                    setTimeout(pollForResult, 2000);
                }
            } else {
                spinnerContainer.style.display = 'none';
                resultDiv.innerHTML = `<p style="color: red;">Error: Failed to fetch results.</p>`;
                resultDiv.style.display = 'block';
            }
        }

        function displayResult(data) {
            spinnerContainer.style.display = 'none';
            if (data.result) {
              resultDiv.innerHTML = `<pre>${data.result}</pre>`;
              resultDiv.style.display = 'block';
            } else {
                resultDiv.innerHTML = '<p>No results found.</p>';
                resultDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
