<!DOCTYPE html>
<html>
<head>
    <title>Academic Journal Summarizer</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        /* Add some basic styling for the spinner */
        .spinner-container {
            display: none; /* Initially hidden */
            margin-top: 20px;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* Additional Styles (Optional, but improve appearance) */
        body {
            font-family: sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        label {
            display: block; /* Make labels block-level for better spacing */
            margin-bottom: 5px;
        }
        textarea, input[type="text"], input[type="submit"], select {
            width: 100%; /* Full-width inputs/textareas */
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;  /* Include padding/border in width */
        }
        .btn-primary {
          background-color: #007bff;
          border-color: #007bff;
        }

        .btn-primary:hover {
          background-color: #0056b3;
          border-color: #0056b3;
        }
        #result {
            white-space: pre-wrap; /* Preserve line breaks and spaces from the server */
            margin-top: 20px;
            border: 1px solid #ddd;
            padding: 10px;
            background-color: #f8f9fa;
        }

        nav {
          margin-bottom: 20px;
        }
        nav a {
          margin-right: 10px;
          text-decoration: none;
          color: #007bff;
        }
        nav a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav>
      <a href="/">Home</a> |
      <a href="/about">About</a>
    </nav>

    <div class="container">
        <h1>Academic Journal Summarizer</h1>
        <p style="font-size: 1.2em; color: gray;">{{ subtitle | safe }}</p>

        <form method="POST" id="analysis-form">
            <label for="api_key">Gemini API Key:</label>
            <input type="text" id="api_key" name="api_key">

            <label>Select Journals:</label>
            {% for journal, url in journal_dict.items() %}
            <div>
                <input type="checkbox" id="{{ journal }}" name="journals" value="{{ journal }}">
                <label for="{{ journal }}">{{ journal }}</label>
            </div>
            {% endfor %}

            <label for="custom_rss_url">Custom RSS URL (Optional):</label>
            <input type="text" id="custom_rss_url" name="custom_rss_url">

            <input type="submit" value="Analyze Feed Contents" class="btn btn-primary">
        </form>

        <div class="spinner-container" id="spinner-container">
            <div class="spinner"></div>
            <p>Analyzing... Please wait.</p>
        </div>

        <div id="result"></div>  <!-- Result will be displayed here -->
    </div>

    <script>
      const form = document.getElementById('analysis-form');
      const spinnerContainer = document.getElementById('spinner-container');
      const resultDiv = document.getElementById('result');

      form.addEventListener('submit', async (e) => {
          e.preventDefault(); // Prevent default form submission

          spinnerContainer.style.display = 'block'; // Show spinner
          resultDiv.innerHTML = ''; // Clear previous results
          resultDiv.style.display = 'none' // Hide the result div initially


          const formData = new FormData(form);
          const response = await fetch('/', {
              method: 'POST',
              body: formData
          });

          if (response.status === 202) {
              // Start polling for results
              pollForResult();
          } else if (response.ok) {
              const data = await response.json();
              displayResult(data);
          } else {
                spinnerContainer.style.display = 'none'; // Hide the spinner
                const errorData = await response.json();
                resultDiv.innerHTML = `<p style="color: red;">Error: ${errorData.error}</p>`;
                resultDiv.style.display = 'block'; // Show result div with error
          }
      });

      async function pollForResult() {
        const response = await fetch('/results');

        if (response.ok) {
          const data = await response.json();
          if (data.status === 'completed') {
            displayResult(data);
          } else if (data.status === 'pending') {
            // Wait a bit and poll again
            setTimeout(pollForResult, 2000); // Check every 2 seconds
          }
        } else {
             // Handle errors from /results (e.g., server error)
              spinnerContainer.style.display = 'none';
              resultDiv.innerHTML = `<p style="color: red;">Error: Failed to fetch results.</p>`;
              resultDiv.style.display = 'block'
        }
      }

      function displayResult(data) {
        spinnerContainer.style.display = 'none'; // Hide spinner
        if (data.result) {
          resultDiv.innerHTML = `<pre>${data.result}</pre>`; // Display the result, preserving formatting
          resultDiv.style.display = 'block'
        } else {
          resultDiv.innerHTML = '<p>No results found.</p>';
          resultDiv.style.display = 'block'
        }
    }

    </script>
</body>
</html>
