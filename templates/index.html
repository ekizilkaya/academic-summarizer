<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Summarizer</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { font-family: sans-serif; }
        .container { max-width: 900px; }
        #result { margin-top: 20px; }
        .journal-header { font-weight: bold; margin-top: 1em; }
        .article { margin-bottom: 1em; padding-left: 1em; border-left: 3px solid #ddd; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container">
        <h1>Academic Summarizer</h1>
        <p>{{ subtitle }}</p>

        <form id="analysisForm">
            <div class="form-group">
                <label for="api_key">Gemini API Key:</label>
                <input type="password" class="form-control" id="api_key" name="api_key" required>
                <small class="form-text text-muted">Your API key is used client-side and is not stored on the server.</small>
            </div>

            <div class="form-group">
                <label for="journals">Select Journals (max 3):</label><br>
                {% for journal, url in journal_dict.items() %}
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" name="journals" value="{{ journal }}" id="{{ journal }}">
                        <label class="form-check-label" for="{{ journal }}">
                            {{ journal }}
                        </label>
                    </div>
                {% endfor %}
            </div>
            <div class="form-group">
                <label for="custom_rss_url">Custom RSS URL (optional):</label>
                <input type="url" class="form-control" id="custom_rss_url" name="custom_rss_url">
            </div>
            <button type="submit" class="btn btn-primary">Summarize Articles</button>
        </form>

        <div id="loadingIndicator" style="display: none;">
            <p>Loading...</p>
        </div>

        <div id="result">
            <!-- Summary will be displayed here -->
        </div>
        <p><a href="/about">About This App</a></p>
    </div>

    <script>
        document.getElementById('analysisForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            const apiKey = document.getElementById('api_key').value;
            const selectedJournals = Array.from(document.querySelectorAll('input[name="journals"]:checked')).map(el => el.value);
            const customRssUrl = document.getElementById('custom_rss_url').value;

            if (!apiKey) {
                Swal.fire({
                  icon: "error",
                  title: "Oops...",
                  text: "Please enter your Gemini API key."
                });
                return;
            }

            if (selectedJournals.length === 0 && !customRssUrl) {
                Swal.fire({
                    icon: "error",
                    title: "Oops...",
                    text: "Please select at least one journal or provide a custom RSS URL."
                  });
                return;
            }

            if (selectedJournals.length > 3) {
              Swal.fire({
                    icon: "error",
                    title: "Oops...",
                    text: "Please select a maximum of 3 journals."
                  });
              return;
            }

            // Store API key in sessionStorage
            sessionStorage.setItem('gemini_api_key', apiKey);


            // Construct FormData for the backend request (no API key here)
            const formData = new FormData();
            formData.append('journals', selectedJournals.join(','));
            if (customRssUrl) {
                formData.append('custom_rss_url', customRssUrl);
            }

            // Show loading indicator
            document.getElementById('loadingIndicator').style.display = 'block';
            document.getElementById('result').innerHTML = ''; // Clear previous results

            try {
                // Step 1:  Get the prompt from the backend
                const backendResponse = await fetch('/', {
                    method: 'POST',
                    body: formData
                });

                if (!backendResponse.ok) {
                    const errorData = await backendResponse.json();
                    throw new Error(errorData.error || 'Backend error');
                }

                const { prompt, summary_data } = await backendResponse.json();

              // Step 2: Make the Gemini API request (client-side)
              const geminiResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                  method: 'POST',
                  headers: {
                      'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                      contents: [{ parts: [{ text: prompt }] }],
                      generationConfig: { maxOutputTokens: 16384, temperature: 0.2 }
                  })
              });

              if (!geminiResponse.ok) {
                  const errorText = await geminiResponse.text();
                  throw new Error(`Gemini API Error (${geminiResponse.status}): ${errorText}`);
              }

              const geminiData = await geminiResponse.json();
              let summaryText;
              try {
                summaryText = geminiData.candidates[0].content.parts[0].text.trim();
              } catch (error) {
                console.log(geminiData)
                throw new Error(`Failed to parse Gemini API response`)
              }

              //Step 3: Display the results.
              document.getElementById('result').innerHTML = `<pre>${summaryText}</pre>`;

            } catch (error) {
                console.error('Error:', error);
                Swal.fire({
                  icon: "error",
                  title: "Oops...",
                  text: error
                });

            } finally {
                // Hide loading indicator
                document.getElementById('loadingIndicator').style.display = 'none';
            }
        });
    </script>
</body>
</html>
