<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Academic Summarizer</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #343a40;
        }
        .container {
            max-width: 960px;
        }
        .jumbotron {
            background-color: #e9ecef;
            padding: 2rem 1rem;
            margin-bottom: 2rem;
            border-radius: 0.3rem;
        }
        .lead {
            font-size: 1.25rem;
            font-weight: 300;
        }
        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
        }
        .btn-primary:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }
        .list-group-item {
            border: none;
            padding: 0.75rem 0;
        }
        .social-icons a {
            font-size: 1.5rem;
            margin-right: 1rem;
            color: #007bff;  /* Bootstrap primary color */
            transition: color 0.3s ease;
        }
        .social-icons a:hover {
            color: #0056b3; /* Darker shade on hover */
            text-decoration: none; /* Remove underline on hover */
        }
        .footer {
          margin-top: 2rem;
          text-align: center;
          color: grey;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="jumbotron mt-4">
            <h1 class="display-4">About Academic Summarizer</h1>
            <p class="lead">Learn more about this project and how it works.</p>
            <hr class="my-4">
             <a class="btn btn-primary btn-lg" href="/" role="button">Back to Summarizer</a>
        </div>

        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card">
                    <div class="card-body">
                       {{ about_text | safe }}
                    </div>
                </div>


                <div class="mt-4">
                    <h4>Connect With Me</h4>
                     <div class="social-icons">
                        <a href="https://www.linkedin.com/in/emre-kizilkaya" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
                        <a href="https://bsky.app/profile/emrekizilkaya.bsky.social" target="_blank" aria-label="Bluesky"><i class="fab fa-square"></i></a> <!-- Placeholder icon, Bluesky doesn't have a standard one in Font Awesome -->
                    </div>
                </div>
                </div>
        </div>
      <footer class="footer">
          <p>©  <a href="https://emrekizilkaya.com" target="_blank">Emre Kızılkaya</a></p>
      </footer>
    </div>
</body>
</html>
